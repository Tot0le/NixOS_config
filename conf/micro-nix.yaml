filetype: nix

detect:
    match: "\\.nix$"

rules:
    # Commentaires
    - comment:
        start: "#"
        end: "$"
    - comment:
        start: "/\\*"
        end: "\\*/"

    # Mots-clés
    - statement: "\\b(if|then|else|with|let|in|inherit|rec|import|assert|or)\\b"
    - constant.bool: "\\b(true|false)\\b"
    - constant: "\\bnull\\b"

    # Chaînes de caractères simples (rules: [] est crucial ici)
    - constant.string:
        start: "\""
        end: "\""
        skip: "\\\\."

    # Chaînes de caractères multi-lignes
    - constant.string:
        start: "''"
        end: "''"

    # Opérateurs et symboles (syntaxe simplifiée)
    - symbol: "[=+/*<>!?&|@:-]+"
    - symbol: "[()\\[\\]{}]"
    - symbol: "[.,;]"
