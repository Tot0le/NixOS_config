# --- Appearance ---
font_family             Departure Mono
font_size               11
bold_font               auto
italic_font             auto
bold_italic_font        auto
background_opacity      0.5
cursor_shape            beam
cursor_trail            1
window_margin_width     21.75

# --- Window Management ---
confirm_os_window_close 0

# --- Smart Clipboard Management ---
# Copy if selection exists, otherwise send SIGINT (Ctrl+C)
map ctrl+c              copy_or_interrupt
# Standard paste (Ctrl+V)
map ctrl+v              paste_from_clipboard

# Disable default shift mappings to prevent conflicts
map ctrl+shift+c        no_op
map ctrl+shift+v        no_op

# --- Navigation & Search ---
map page_up             scroll_page_up
map page_down           scroll_page_down
map ctrl+f              launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# =========================================================
# PRO SETTINGS (Commented out - Remove '#' to activate)
# =========================================================

# --- Terminal Bell ---
# enable_audio_bell no
# visual_bell_duration 0.1
# window_alert_on_bell yes

# --- URL Handling ---
# open_url_with firefox
# url_prefixes http https file mailto
# detect_urls yes
# url_style curly

# --- Mouse ---
# mouse_hide_wait 3.0
# copy_on_select yes
# focus_follows_mouse yes

# --- Performance ---
# sync_to_monitor yes
# repaint_delay 10
# input_delay 3

# --- Tab Bar ---
# tab_bar_edge top
# tab_bar_style powerline
# tab_powerline_style slanted
# active_tab_font_style bold

# --- Layouts ---
# enabled_layouts tall,stack,grid,fat

# --- Theme ---
# BEGIN_KITTY_THEME
# Base2Tone Suburb Dark
include current-theme.conf
# END_KITTY_THEME
